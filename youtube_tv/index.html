<body>
    <main>
        <div>
            <div class="d-flex" id="screen_top">
                <div id="video_tabs" class=" flex-grow-1 h-full p-0 m-0 ">
                </div>
               
                <div id="detail_tabs" class=" h-full p-0 m-0">
                </div>
            </div>
            <div class="row" id="screen_bottom">
                 <div class="btn-group col-12" style="height: 35px;">
                     <a href="#" class="btn btn-icon" aria-label="Button" data-action="playlist_all" title="播放列表">
                       <i class="ti ti-list fs-2"></i>
                    </a>
                    <a href="#" class="btn btn-icon" aria-label="Button" data-action="cut_setStart" title="设置起点">
                       <i class="ti ti-brackets-contain-start fs-2"></i>
                    </a>
                     <a href="#" class="btn btn-icon" aria-label="Button" data-action="cut_setEnd" title="设置终点">
                       <i class="ti ti-brackets-contain-end fs-2"></i>
                    </a>
                     <a href="#" class="btn btn-icon" aria-label="Button" data-action="cut_start" title="添加裁剪">
                       <i class="ti ti-cut fs-2"></i>
                    </a>
                     <a href="#" class="btn btn-icon" aria-label="Button" data-action="video_openURL" title="打开网页">
                       <i class="ti ti-world fs-2"></i>
                    </a>
                    <a href="#" class="btn btn-icon" aria-label="Button" data-action="video_download" title="下载">
                       <i class="ti ti-download fs-2"></i>
                    </a>

                    <a href="#" class="btn btn-icon" aria-label="Button" data-action="episode_covers" title="所有剧集">
                       <i class="ti ti-photo fs-2"></i>
                    </a>

                      <a href="#" class="btn btn-icon" aria-label="Button" data-action="video_reload" title="刷新">
                       <i class="ti ti-refresh fs-2"></i>
                    </a>
               
                </div>
                <div id="episode_list" class="col-2 p-2 h-full" style="min-width: 150px;width: 200px">
                    <div id="episode_header" class="d-flex  align-items-center w-full border-bottom p-2">
                        <div class="flex-grow-1">
                            <span class="status status-warning">
                                <span class="status-dot"></span>
                                <b>等待中...</b>
                            </span>
                        </div>
                        <div>
                            <a title="插件" class="btn p-0" href="#dropdown-episode" data-bs-toggle="dropdown" data-bs-auto-close="outside" role="button" aria-expanded="false"><i class="ti ti-dots"></i></a>
                            <div class="dropdown-menu " id="dropdown-episode">
                                <a class="dropdown-item" data-action="parseUrl">
                                    解析网址
                                </a>
                                <div class="dropdown-divider"></div>
                            </div>
                        </div>
                    </div>
                    <div id="episode_accordion" class="overflow-y-auto" style="height: calc(100% - 50px)"></div>
                </div>
                <div id="episode_content" class="col h-full">
                    <div id="episode_sb" class="card p-2 overflow-y-auto h-full" style="padding-bottom: 100px">
                    </div>
                </div>
            </div>
        </div>
    </main>
